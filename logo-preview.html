<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hero Logo Preview | ChibaRock Festival 2026</title>
    <link rel="icon" href="assets/logo-mark.png">
    <style>
      :root {
        color-scheme: dark;
        --bg: #06070d;
        --text: #fffaf5;
        --cyan: #00c8ff;
        --green: #42d66f;
        --yellow: #ffd43d;
        --orange: #ff7a1a;
        --pink: #f30090;
        --violet: #8a28ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #030408;
        color: var(--text);
        font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      }

      .preview-header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 18px clamp(18px, 4vw, 48px);
        background: rgba(3, 4, 8, 0.86);
        backdrop-filter: blur(14px);
      }

      .preview-header h1,
      .preview-header p {
        margin: 0;
      }

      .preview-header h1 {
        font-size: clamp(18px, 2.6vw, 28px);
        line-height: 1.1;
      }

      .preview-header p {
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        font-weight: 800;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview-card {
        min-width: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
      }

      .preview-title {
        padding: 20px clamp(18px, 3vw, 36px);
        background: #080912;
      }

      .preview-title h2 {
        margin: 0 0 4px;
        font-size: clamp(22px, 3vw, 36px);
      }

      .preview-title p {
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
        font-size: 14px;
        font-weight: 700;
      }

      .hero {
        position: relative;
        display: grid;
        min-height: 82svh;
        padding: 86px clamp(18px, 5vw, 56px) 58px;
        overflow: hidden;
        isolation: isolate;
        place-items: center;
      }

      .hero::before {
        position: absolute;
        inset: 0;
        z-index: -4;
        content: "";
        background:
          linear-gradient(120deg, rgba(0, 200, 255, 0.12), transparent 22%, rgba(255, 122, 26, 0.13) 50%, transparent 70%, rgba(243, 0, 144, 0.17)),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 80px),
          linear-gradient(180deg, #07080f 0%, #10121c 48%, #05050a 100%);
      }

      .hero::after {
        position: absolute;
        inset: auto 0 0;
        z-index: -1;
        height: 34%;
        content: "";
        background: linear-gradient(0deg, var(--bg) 5%, transparent);
      }

      .beam {
        position: absolute;
        z-index: -3;
        width: 34vw;
        min-width: 260px;
        height: 110vh;
        clip-path: polygon(42% 0, 58% 0, 100% 100%, 0 100%);
        mix-blend-mode: screen;
        opacity: 0.28;
      }

      .beam-blue {
        top: -18vh;
        left: 1vw;
        background: linear-gradient(180deg, var(--cyan), transparent);
        transform: rotate(22deg);
      }

      .beam-orange {
        top: -24vh;
        left: 38%;
        background: linear-gradient(180deg, var(--orange), transparent);
        transform: rotate(-8deg);
      }

      .beam-pink {
        top: -18vh;
        right: -5vw;
        background: linear-gradient(180deg, var(--pink), transparent);
        transform: rotate(-24deg);
      }

      .hero-ring {
        position: absolute;
        z-index: -2;
        width: min(72vw, 720px);
        aspect-ratio: 1;
        border: 2px solid transparent;
        border-radius: 50%;
        background:
          linear-gradient(var(--bg), var(--bg)) padding-box,
          conic-gradient(from 205deg, var(--cyan), var(--green), var(--yellow), var(--orange), var(--pink), var(--violet), var(--cyan)) border-box;
        opacity: 0.46;
        mask-image: linear-gradient(135deg, black, transparent 73%);
      }

      .hero-inner {
        display: grid;
        width: min(100%, 880px);
        place-items: center;
        text-align: center;
      }

      .hero-kicker {
        margin: 0;
        color: var(--yellow);
        font-size: 13px;
        font-weight: 900;
      }

      .hero-date {
        margin: 20px 0 0;
        font-size: clamp(38px, 7vw, 92px);
        font-weight: 950;
        line-height: 0.95;
        text-shadow: 0 0 24px rgba(243, 0, 144, 0.45);
      }

      .hero-place {
        margin: 10px 0 0;
        font-size: clamp(19px, 3vw, 38px);
        font-weight: 900;
      }

      .ticket-button {
        display: inline-grid;
        min-width: 174px;
        min-height: 52px;
        margin-top: 26px;
        padding: 12px 30px;
        border: 2px solid rgba(255, 255, 255, 0.82);
        border-radius: 999px;
        background: #ff2638;
        color: #fff;
        box-shadow: 0 0 30px rgba(255, 38, 56, 0.35);
        font-size: 17px;
        font-weight: 950;
        line-height: 1;
        text-decoration: none;
        place-items: center;
      }

      .logo-soft {
        position: relative;
        width: min(94vw, 820px);
        margin: 18px 0 8px;
        padding: clamp(10px, 1.4vw, 18px);
        background: rgba(255, 255, 255, 0.88);
        box-shadow:
          0 26px 72px rgba(0, 0, 0, 0.44),
          0 0 46px rgba(0, 200, 255, 0.18);
        isolation: isolate;
      }

      .logo-soft::before,
      .logo-soft::after {
        position: absolute;
        inset: -24px;
        z-index: -1;
        content: "";
        pointer-events: none;
      }

      .logo-soft::before {
        background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.18) 45%, transparent 72%);
        filter: blur(18px);
      }

      .logo-soft::after {
        background: linear-gradient(90deg, rgba(0, 200, 255, 0.22), rgba(255, 212, 61, 0.18), rgba(243, 0, 144, 0.22));
        filter: blur(28px);
        opacity: 0.55;
        mix-blend-mode: screen;
      }

      .logo-soft img {
        width: 100%;
        height: auto;
        mix-blend-mode: normal;
      }

      .logo-signboard {
        position: relative;
        width: min(94vw, 820px);
        margin: 18px 0 8px;
        padding: clamp(14px, 1.8vw, 24px);
        border: 1px solid rgba(255, 255, 255, 0.26);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.05)),
          rgba(7, 8, 15, 0.72);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          0 26px 80px rgba(0, 0, 0, 0.58),
          0 0 44px rgba(0, 200, 255, 0.24);
        backdrop-filter: blur(14px) saturate(1.35);
        overflow: hidden;
      }

      .logo-signboard::before {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(90deg, var(--cyan), var(--green), var(--yellow), var(--orange), var(--pink), var(--violet));
        opacity: 0.8;
        height: 5px;
      }

      .logo-signboard::after {
        position: absolute;
        inset: -40%;
        content: "";
        background: linear-gradient(115deg, transparent 35%, rgba(255, 255, 255, 0.28), transparent 52%);
        transform: translateX(-24%);
      }

      .logo-signboard img {
        position: relative;
        z-index: 1;
        width: 100%;
        height: auto;
        padding: clamp(8px, 1vw, 14px);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 28px rgba(255, 255, 255, 0.12);
      }

      @media (max-width: 980px) {
        .preview-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="preview-header">
      <div>
        <h1>Hero Logo Preview</h1>
        <p>案1・案4の比較</p>
      </div>
      <p>ChibaRock Festival 2026</p>
    </header>

    <main class="preview-grid">
      <section class="preview-card" aria-labelledby="idea-1">
        <div class="preview-title">
          <h2 id="idea-1">案1: 白背景を透過風に見せる</h2>
          <p>白いロゴ面の周囲をぼかし、背景に自然に溶け込ませる方向です。</p>
        </div>
        <div class="hero">
          <span class="beam beam-blue"></span>
          <span class="beam beam-orange"></span>
          <span class="beam beam-pink"></span>
          <div class="hero-ring" aria-hidden="true"></div>
          <div class="hero-inner">
            <p class="hero-kicker">ROPPONGI GT LIVE TOKYO</p>
            <div class="logo-soft">
              <img src="assets/logo-main.jpg" alt="ChibaRock Festival 2026">
            </div>
            <p class="hero-date">2026.9.5 sat.</p>
            <p class="hero-place">六本木GT LIVE TOKYO</p>
            <a class="ticket-button" href="index.html#ticket">TICKET</a>
          </div>
        </div>
      </section>

      <section class="preview-card" aria-labelledby="idea-4">
        <div class="preview-title">
          <h2 id="idea-4">案4: 光る看板風にする</h2>
          <p>ロゴをライブ会場のLEDサインのように扱い、ステージ感を強める方向です。</p>
        </div>
        <div class="hero">
          <span class="beam beam-blue"></span>
          <span class="beam beam-orange"></span>
          <span class="beam beam-pink"></span>
          <div class="hero-ring" aria-hidden="true"></div>
          <div class="hero-inner">
            <p class="hero-kicker">ROPPONGI GT LIVE TOKYO</p>
            <div class="logo-signboard">
              <img src="assets/logo-main.jpg" alt="ChibaRock Festival 2026">
            </div>
            <p class="hero-date">2026.9.5 sat.</p>
            <p class="hero-place">六本木GT LIVE TOKYO</p>
            <a class="ticket-button" href="index.html#ticket">TICKET</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
